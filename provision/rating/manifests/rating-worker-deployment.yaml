apiVersion: apps/v1
kind: Deployment
metadata:
  name: rating-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rating-worker
  template:
    metadata:
      labels:
        app: rating-worker
    spec:
      containers:
        - name: rating-worker
          image: marosalesji/rating-worker:latest
          env:
            - name: SQS_QUEUE_URL
              value: "https://sqs.us-east-1.amazonaws.com/<aws-account>/rating-requests"
            - name: RDS_SECRET_NAME
              value: "videoclub/rds/credentials"
            - name: AWS_DEFAULT_REGION
              value: "us-east-1"
            - name: POLL_INTERVAL_SECONDS
              value: "5"
            - name: FORCE_CRITICAL_CRASH
              value: "false"
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "100m"
          livenessProbe:
            exec:
              command:
                - test
                - -f
                - /tmp/worker-alive
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
